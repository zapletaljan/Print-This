<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print This!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="navbar">
        <div class="logo">
            <img src="img/logo.svg" alt="Logo">
        </div>
        <div class="nav-links">
            <a href="#">Home</a>

            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>
    </div>
    <div class="container">
        <div class="info">
            <h1>Welcome to Print This!</h1>
            <p>Do you have a 3D model you'd like to print? You've come to the right place!</p>
            <p>Doesn't matter if it's a prototype, a display piece, or a functional part, I can print it all!</p>
            <p>To order a print of your 3D model, simply fill out our very short <a href="#form-container">form</a>.</p>
            <div class="info-btns">
                <button class="order-btn" id="interest-btn">I'm interested!</button>
                <button class="order-btn" id="hardware-btn">Show me the hardware!</button>
            </div>
        </div>
        <div class="printer-img">
            <img src="img/printer img.png" alt="3D Printer">
        </div>
    </div>
    <div id="form-container"> <iframe id="jotform-embed" src="https://form.jotform.com/261635588582066"
            style="width: 40%; height: 600px; border: 0;" frameborder="0" scrolling="no"> </iframe> </div>

</body>

</html>
